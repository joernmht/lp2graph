name: docs

on:
  push:
    branches: [main]
    paths:
      - "docs/**"
      - "src/**"
      - "mkdocs.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[docs]"
      - name: Build site
        run: mkdocs build --strict
      - name: Assemble Pages tree (landing at root, mkdocs under /docs/)
        run: |
          mkdir -p public
          cp -r site public/docs
          cp docs/demo/index.html docs/demo/explore.html docs/demo/configurator.html public/
          # keep the old /demo/ URLs working (conference links already shared)
          mkdir -p public/demo
          cp docs/demo/index.html docs/demo/explore.html docs/demo/configurator.html public/demo/
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
